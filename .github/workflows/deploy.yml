name: Deploy app React a GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permisos que necesita el deploy de Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Evita deploys pisándose entre sí
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: commission-tracker-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias
        run: npm install --no-audit --no-fund

      - name: Compilar (vite build)
        run: npm run build

      - name: Subir artefacto de Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: commission-tracker-app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Desplegar en Pages
        id: deployment
        uses: actions/deploy-pages@v4
